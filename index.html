<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Godot 游戏合集 - GitHub Pages</title>

    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- 替换成更稳定的 unpkg CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #f5f7fa;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --border-color: rgba(226, 232, 240, 0.5);
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --btn-hover: #eef2f6;
            --modal-bg: #ffffff;
            --desc-color: #475569;
            --badge-bg: #dbeafe;
            --badge-color: #2563eb;
        }

        .dark-mode {
            --bg-color: #161b22;
            --text-color: #c9d1d9;
            --card-bg: #0d1117;
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            --border-color: #30363d;
            --input-bg: #0d1117;
            --input-border: #30363d;
            --btn-hover: #21262d;
            --modal-bg: #0d1117;
            --desc-color: #8b949e;
            --badge-bg: #1f2937;
            --badge-color: #58a6ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 60px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        a { text-decoration: none; color: inherit; }

        .navbar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar h1 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .navbar h1 i { color: #60a5fa; }
        .navbar .subtitle { font-size: 14px; color: #94a3b8; font-weight: 400; }
        .navbar .right-group { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .navbar .stats { display: flex; gap: 20px; font-size: 14px; color: #cbd5e1; }
        .navbar .stats span { display: flex; align-items: center; gap: 6px; }
        .navbar .stats i { color: #60a5fa; }
        #themeToggle {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        #themeToggle:hover { background: rgba(255, 255, 255, 0.25); }

        .toolbar-container {
            display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .toolbar { flex: 1; display: flex; gap: 16px; min-width: 200px; flex-wrap: wrap; }
        .toolbar .search-box {
            flex: 1; min-width: 160px;
            display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: 14px; padding: 0 16px; transition: border-color 0.2s;
        }
        .toolbar .search-box:focus-within { border-color: #60a5fa; }
        .toolbar .search-box i { color: #94a3b8; margin-right: 10px; }
        .toolbar .search-box input {
            width: 100%; padding: 12px 0; border: none; outline: none;
            background: transparent; color: var(--text-color); font-size: 15px; font-family: inherit;
        }
        .toolbar .random-btn {
            padding: 12px 24px; background: linear-gradient(135deg, #60a5fa, #3b82f6);
            color: #fff; border: none; border-radius: 14px; font-size: 15px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s; white-space: nowrap;
        }
        .toolbar .random-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3); }

        .rank-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 16px 20px; min-width: 180px; flex: 0 0 240px;
            transition: background 0.3s;
        }
        .rank-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .rank-box .rank-item {
            display: flex; align-items: center; gap: 10px; padding: 6px 0;
            border-bottom: 1px solid var(--border-color); font-size: 13px;
        }
        .rank-box .rank-item:last-child { border-bottom: none; }
        .rank-box .rank-item .rnum { font-weight: 700; color: #e11d48; width: 20px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; }
        .game-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            box-shadow: var(--card-shadow); transition: transform 0.25s, box-shadow 0.3s, background 0.3s;
            display: flex; flex-direction: column; border: 1px solid var(--border-color);
        }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10); }
        .game-card .thumbnail { width: 100%; aspect-ratio: 16 / 9; background: #e2e8f0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .game-card .thumbnail img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .game-card:hover .thumbnail img { transform: scale(1.03); }
        .game-card .body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
        .game-card .body .title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text-color); display: flex; align-items: center; justify-content: space-between; }
        .game-card .body .title .badge { font-size: 11px; background: var(--badge-bg); color: var(--badge-color); padding: 2px 10px; border-radius: 20px; font-weight: 600; }
        .game-card .body .description { font-size: 14px; color: var(--desc-color); line-height: 1.6; margin-bottom: 16px; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .game-card .actions { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--border-color); padding-top: 14px; margin-top: 4px; align-items: center; }
        .game-card .actions button {
            flex: 1; min-width: 50px; padding: 8px 8px; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color);
        }
        .game-card .actions button:hover { background: var(--btn-hover); transform: translateY(-1px); }
        .game-card .actions button.share-btn { color: #2563eb; }
        .game-card .actions button.comment-btn { color: #7c3aed; }
        .game-card .actions button.favorite-btn { color: #e11d48; }
        .game-card .actions button.favorite-btn.active { background: #fecdd3; color: #be123c; }
        .dark-mode .game-card .actions button.favorite-btn.active { background: #4a1a2a; color: #f87171; }
        .game-card .actions button.like-btn { color: #10b981; }
        .game-card .actions button.like-btn i { font-size: 15px; }
        .game-card .actions button.like-btn.liked { background: #d1fae5; border-color: #10b981; color: #047857; }
        .dark-mode .game-card .actions button.like-btn.liked { background: #064e3b; border-color: #10b981; color: #6ee7b7; }

        .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 999; }
        .fab-container .fab { width: 52px; height: 52px; border-radius: 50%; border: none; background: #1e293b; color: #fff; font-size: 20px; cursor: pointer; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.20); transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; position: relative; }
        .fab-container .fab:hover { transform: scale(1.08); background: #0f172a; }
        .fab-container .fab.fav-fab { background: #e11d48; }
        .fab-container .fab.fav-fab:hover { background: #be123c; }
        .fab-container .fab.top-fab { background: #2563eb; }
        .fab-container .fab.top-fab:hover { background: #1d4ed8; }
        .fab-container .fab .badge-count { position: absolute; top: -6px; right: -6px; background: #f59e0b; color: #fff; font-size: 11px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 28px; border-radius: 16px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.20); z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.60); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.25s ease; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--modal-bg); border-radius: 24px; max-width: 800px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 28px 32px 32px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.30); animation: slideUp 0.30s ease; position: relative; transition: background 0.3s; border: 1px solid var(--border-color); }
        .modal .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .modal .modal-header h2 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--text-color); }
        .modal .modal-header .close-btn { background: none; border: none; font-size: 24px; color: #94a3b8; cursor: pointer; transition: color 0.2s; padding: 4px 8px; border-radius: 8px; }
        .modal .modal-header .close-btn:hover { color: var(--text-color); background: var(--btn-hover); }
        .modal .favorite-list .fav-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); color: var(--text-color); }
        .modal .favorite-list .fav-item:last-child { border-bottom: none; }
        .modal .favorite-list .fav-item .fav-title { font-weight: 600; font-size: 15px; }
        .modal .favorite-list .fav-item .fav-link { color: #2563eb; font-size: 13px; cursor: pointer; }
        .modal .favorite-list .empty-msg { color: #94a3b8; text-align: center; padding: 30px 0; }

        @media (max-width: 768px) {
            .navbar { padding: 16px 20px; flex-direction: column; gap: 12px; text-align: center; }
            .navbar .right-group { width: 100%; justify-content: center; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
            .modal { padding: 20px; margin: 10px; }
            .fab-container { bottom: 20px; right: 20px; }
            .fab-container .fab { width: 46px; height: 46px; font-size: 17px; }
            .toolbar-container { flex-direction: column; }
            .rank-box { flex: 1 1 auto; min-width: unset; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>
    <header class="navbar">
        <div><h1><i class="fas fa-gamepad"></i> Godot 游戏合集 <span class="subtitle">· 托管于 GitHub Pages</span></h1></div>
        <div class="right-group">
            <div class="stats">
                <span><i class="fas fa-box"></i> <strong id="gameCount">0</strong> 款游戏</span>
                <span><i class="fas fa-heart"></i> <strong id="favCount">0</strong> 已收藏</span>
            </div>
            <button id="themeToggle" title="切换暗黑/明亮模式"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="container">
        <div class="toolbar-container">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索游戏名称或描述..." />
                </div>
                <button class="random-btn" id="randomBtn"><i class="fas fa-dice"></i> 随机一个游戏</button>
            </div>
            <div class="rank-box" id="rankBox">
                <h3><i class="fas fa-chart-simple"></i> 热度排行</h3>
                <div id="rankList">
                    <div style="font-size: 13px; color: var(--desc-color); padding: 10px 0;">正在获取热度数据...</div>
                </div>
            </div>
        </div>
        <div class="grid" id="gameGrid"></div>
    </main>

    <div class="fab-container">
        <button class="fab fav-fab" id="openFavoritesBtn" title="查看我的收藏"><i class="fas fa-heart"></i><span class="badge-count" id="favBadge">0</span></button>
        <button class="fab top-fab" id="scrollTopBtn" title="回到顶部"><i class="fas fa-arrow-up"></i></button>
    </div>

    <div class="modal-overlay" id="commentModal">
        <div class="modal">
            <div class="modal-header"><h2><i class="fas fa-comments"></i> 评论 · <span id="commentGameTitle">游戏</span></h2><button class="close-btn" id="closeCommentModal"><i class="fas fa-times"></i></button></div>
            <div id="giscus-container" style="margin-top: 10px; min-height: 300px;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="favoritesModal">
        <div class="modal">
            <div class="modal-header"><h2><i class="fas fa-heart" style="color:#e11d48;"></i> 我的收藏</h2><button class="close-btn" id="closeFavoritesModal"><i class="fas fa-times"></i></button></div>
            <div class="favorite-list" id="favoriteList"><div class="empty-msg">还没有收藏的游戏，快去收藏吧 ❤️</div></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // =================================================================
        //  1. 配置区（游戏数据 & 你最新的 Supabase 密钥）
        // =================================================================
        const GAMES_DATA = [{
            id: 1,
            title: 'Flappy Bird',
            description: '按下空格键开始游戏，不要碰到管道',
            thumbnail: 'https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400&h=225&fit=crop&auto=format',
            gameUrl: 'https://flappy-bird-evening.netlify.app/',
            shareUrl: 'https://flappy-bird-evening.netlify.app/'
        }, {
            id: 2,
            title: '2D平台游戏 第一版',
            description: 'Enter键，空格键跳跃；左方向键和右方向键控制方向',
            thumbnail: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=225&fit=crop&auto=format',
            gameUrl: 'https://platform-game-1-2d.netlify.app/',
            shareUrl: 'https://platform-game-1-2d.netlify.app/'
        }, {
            id: 3,
            title: '2D平台游戏 第二版',
            description: 'Enter键，空格键,向上键跳跃；蘑菇增强跳跃；ESC暂停',
            thumbnail: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=400&h=225&fit=crop&auto=format',
            gameUrl: 'https://platform-game-2-2d.netlify.app/',
            shareUrl: 'https://platform-game-2-2d.netlify.app/'
        }, {
            id: 4,
            title: 'Fox Shotting Game',
            description: 'WASD控制狐狸行动方向，不断击退敌人，挑战高分',
            thumbnail: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=225&fit=crop&auto=format',
            gameUrl: 'https://fox-shotting-game.netlify.app/',
            shareUrl: 'https://fox-shotting-game.netlify.app/'
        }];

        // ✅ 已替换成你刚发的全新密钥
        const SUPABASE_URL = 'https://wxsypcfwplnxfccwopno.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4c3lwY2Z3cGxueGZjY3dvcG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNzAwNTEsImV4cCI6MjA5Nzg0NjA1MX0.31axDCFZT3irWEO1nYbBXvHQfE3_P-2sK2Zlnl-feYg';

        // =================================================================
        //  2. 核心初始化（防崩溃代码）
        // =================================================================
        let supabaseClient = null;
        try {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.warn('Supabase SDK 未加载，点赞功能将降级为本地模式');
            }
        } catch (e) {
            console.warn('Supabase 初始化失败，点赞功能将降级为本地模式');
        }

        let favorites = new Set();
        let currentCommentGameId = null;
        let isLiking = false;

        // =================================================================
        //  3. 本地存储
        // =================================================================
        function loadFavorites() { try { const raw = localStorage.getItem('godot_favorites'); if(raw) favorites = new Set(JSON.parse(raw)); } catch (_) {} }
        function saveFavorites() { localStorage.setItem('godot_favorites', JSON.stringify([...favorites])); }
        function loadTheme() { const theme = localStorage.getItem('theme'); if(theme === 'dark') { document.body.classList.add('dark-mode'); document.querySelector('#themeToggle i').className = 'fas fa-sun'; } }
        function saveTheme(theme) { localStorage.setItem('theme', theme); }
        function addRecentPlay(gameId) {
            let recent = JSON.parse(localStorage.getItem('godot_recent') || '[]');
            recent = recent.filter(id => id !== gameId);
            recent.unshift(gameId);
            if(recent.length > 5) recent.pop();
            localStorage.setItem('godot_recent', JSON.stringify(recent));
        }

        // =================================================================
        //  4. 工具函数
        // =================================================================
        function getGameById(id) { return GAMES_DATA.find(g => g.id === id); }
        function showToast(msg, duration = 2200) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(el._hideTimer); el._hideTimer = setTimeout(() => el.classList.remove('show'), duration); }
        function getThumbnailPlaceholder(title) { const colors = ['#2563eb','#7c3aed','#e11d48','#0d9488','#d97706','#4f46e5']; const c = colors[Math.floor(Math.random()*colors.length)]; const letter = title.charAt(0).toUpperCase(); return `<div style="background:${c}; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:64px; font-weight:700; color:#fff;">${letter}</div>`; }
        function getGiscusTheme() { return document.body.classList.contains('dark-mode') ? 'dark' : 'light'; }

        // =================================================================
        //  5. 渲染游戏卡片
        // =================================================================
        async function renderGames(gameList = GAMES_DATA) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            let likesMap = {};
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient.from('game_stats').select('game_id, like_count');
                    if(!error && data) data.forEach(row => likesMap[row.game_id] = row.like_count);
                } catch(e) { /* 忽略错误，不影响卡片展示 */ }
            }

            if(gameList.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--desc-color); font-size: 16px;">没有找到匹配的游戏 🔍</div>`;
                return;
            }

            gameList.forEach(game => {
                const isFav = favorites.has(game.id);
                const likeCount = likesMap[game.id] || 0;

                const card = document.createElement('div'); card.className = 'game-card'; card.dataset.id = game.id;
                const thumbDiv = document.createElement('div'); thumbDiv.className = 'thumbnail';
                if (game.thumbnail) {
                    thumbDiv.innerHTML = `<img src="${game.thumbnail}" alt="${game.title}" loading="lazy" onerror="this.parentElement.innerHTML='${getThumbnailPlaceholder(game.title)}'" />`;
                } else { thumbDiv.innerHTML = getThumbnailPlaceholder(game.title); }

                const body = document.createElement('div'); body.className = 'body';
                body.innerHTML = `
                    <div class="title">${game.title}<span class="badge">Godot</span></div>
                    <div class="description">${game.description}</div>
                    <div class="actions">
                        <button class="share-btn" data-id="${game.id}"><i class="fas fa-share-alt"></i> 分享</button>
                        <button class="comment-btn" data-id="${game.id}"><i class="fas fa-comment"></i> 评论</button>
                        <button class="like-btn" data-id="${game.id}"><i class="fas fa-thumbs-up"></i> <span class="like-count">${likeCount}</span></button>
                        <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${game.id}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i> ${isFav ? '已收藏' : '收藏'}</button>
                    </div>
                `;
                card.appendChild(thumbDiv); card.appendChild(body); grid.appendChild(card);
            });

            document.getElementById('gameCount').textContent = GAMES_DATA.length;
            updateFavBadge();
            grid.addEventListener('click', handleCardClick);
        }

        // =================================================================
        //  6. 卡片事件处理
        // =================================================================
        function handleCardClick(e) {
            const btn = e.target.closest('button'); if(!btn) return;
            const id = parseInt(btn.dataset.id); if(isNaN(id)) return;
            if(btn.classList.contains('share-btn')) handleShare(id);
            else if(btn.classList.contains('comment-btn')) handleComment(id);
            else if(btn.classList.contains('favorite-btn')) handleFavorite(id);
            else if(btn.classList.contains('like-btn')) handleLike(id, btn);
        }

        function handleShare(id) { const game = getGameById(id); if(!game) return; if(navigator.clipboard) navigator.clipboard.writeText(game.shareUrl || game.gameUrl).then(() => showToast('✅ 链接已复制！')); else showToast('⚠️ 请手动复制链接'); }
        function handleFavorite(id) {
            const game = getGameById(id); if(!game) return;
            if(favorites.has(id)) { favorites.delete(id); showToast('💔 已取消收藏'); } else { favorites.add(id); showToast('❤️ 已收藏！'); }
            saveFavorites(); updateFavBadge();
            const btn = document.querySelector(`.favorite-btn[data-id="${id}"]`);
            if(btn) { const active = favorites.has(id); btn.classList.toggle('active', active); btn.innerHTML = `<i class="${active ? 'fas' : 'far'} fa-heart"></i> ${active ? '已收藏' : '收藏'}`; }
        }

        // 全网点赞核心 (升级了更稳定的错误捕获)
        async function handleLike(id, btn) {
            if (!supabaseClient) { showToast('⚠️ 当前云端点赞服务暂不可用'); return; }
            if(isLiking) return;
            isLiking = true;
            const countSpan = btn.querySelector('.like-count');
            let currentCount = parseInt(countSpan.textContent) || 0;

            try {
                const { data, error } = await supabaseClient
                    .from('game_stats')
                    .upsert({ game_id: id, like_count: currentCount + 1 }, { onConflict: 'game_id' })
                    .select();

                if(!error && data && data.length > 0) {
                    countSpan.textContent = data[0].like_count;
                    btn.classList.add('liked');
                    showToast('👍 感谢你的点赞！');
                    fetchAndRenderRank();
                } else {
                    showToast('⚠️ 点赞请求无响应，请重试');
                }
            } catch(e) {
                console.error("点赞出错:", e);
                showToast('⚠️ 网络环境异常，请切换到手机热点或更换网络再试');
            } finally {
                isLiking = false;
            }
        }

        function handleComment(id) {
            const game = getGameById(id); if(!game) return;
            currentCommentGameId = id; document.getElementById('commentGameTitle').textContent = game.title;
            loadGiscus(id); document.getElementById('commentModal').classList.add('open');
        }

        // =================================================================
        //  7. Giscus 评论加载
        // =================================================================
        function loadGiscus(gameId) {
            const container = document.getElementById('giscus-container'); container.innerHTML = '';
            const script = document.createElement('script'); script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'huahuajonny/Godot-Game-Main-Website');
            script.setAttribute('data-repo-id', 'R_kgDOTDbXFQ'); script.setAttribute('data-category', 'Announcements');
            script.setAttribute('data-category-id', 'DIC_kwDOTDbXFc4C_xLf');
            script.setAttribute('data-mapping', 'specific'); script.setAttribute('data-term', `game-${gameId}`);
            script.setAttribute('data-strict', '0'); script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0'); script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', getGiscusTheme()); script.setAttribute('data-lang', 'zh-CN');
            script.crossOrigin = 'anonymous'; script.async = true; container.appendChild(script);
        }

        // =================================================================
        //  8. 热度排行榜
        // =================================================================
        async function fetchAndRenderRank() {
            const rankBox = document.getElementById('rankList');
            const gameIds = GAMES_DATA.map(g => g.id);
            const discussionTitles = gameIds.map(id => `game-${id}`);
            let queryStr = `{ repository(owner: "huahuajonny", name: "Godot-Game-Main-Website") {`;
            discussionTitles.forEach((title, index) => { queryStr += `d${index}: discussion(title: "${title}") { title totalCommentCount totalReactionCount }\n`; });
            queryStr += `}}`;

            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryStr })
                });
                const data = await response.json();
                if(data.errors) return rankBox.innerHTML = '<div style="color:var(--desc-color);font-size:13px;padding:10px 0;">无法获取热度排名</div>';

                let ranks = []; const repoData = data.data.repository;
                Object.keys(repoData).forEach(key => {
                    const item = repoData[key];
                    if(item) { const score = (item.totalCommentCount || 0) * 3 + (item.totalReactionCount || 0); ranks.push({ title: item.title, score }); }
                });
                ranks.sort((a, b) => b.score - a.score); ranks = ranks.slice(0, 3);
                if(ranks.length === 0) return rankBox.innerHTML = '<div style="color:var(--desc-color);font-size:13px;padding:10px 0;">暂无游戏评论互动</div>';

                const medal = ['🥇', '🥈', '🥉'];
                rankBox.innerHTML = ranks.map((r, idx) => `
                    <div class="rank-item"><span class="rnum">${medal[idx]}</span>
                    <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.title.replace('game-', '游戏 ')}</span>
                    <span style="font-weight:600;font-size:12px;">${r.score}</span></div>
                `).join('');
            } catch(e) { rankBox.innerHTML = '<div style="color:var(--desc-color);font-size:13px;padding:10px 0;">加载中...</div>'; }
        }

        // =================================================================
        //  9. 模态框、收藏列表
        // =================================================================
        document.getElementById('closeCommentModal').addEventListener('click', () => { document.getElementById('commentModal').classList.remove('open'); document.getElementById('giscus-container').innerHTML = ''; });
        document.getElementById('commentModal').addEventListener('click', function(e) { if(e.target === this) { this.classList.remove('open'); document.getElementById('giscus-container').innerHTML = ''; } });
        document.getElementById('closeFavoritesModal').addEventListener('click', () => { document.getElementById('favoritesModal').classList.remove('open'); });
        document.getElementById('favoritesModal').addEventListener('click', function(e) { if(e.target === this) this.classList.remove('open'); });
        function renderFavorites() {
            const list = document.getElementById('favoriteList'); const favGames = GAMES_DATA.filter(g => favorites.has(g.id));
            if(favGames.length === 0) return list.innerHTML = `<div class="empty-msg">还没有收藏的游戏，快去收藏吧 ❤️</div>`;
            list.innerHTML = favGames.map(g => `<div class="fav-item"><span class="fav-title">${g.title}</span><span class="fav-link" data-id="${g.id}"><i class="fas fa-external-link-alt"></i> 打开</span></div>`).join('');
            list.querySelectorAll('.fav-link').forEach(el => { el.addEventListener('click', function(){ const id=parseInt(this.dataset.id); const game=getGameById(id); if(game) window.open(game.gameUrl, '_blank'); }); });
        }
        document.getElementById('openFavoritesBtn').addEventListener('click', function() { renderFavorites(); document.getElementById('favoritesModal').classList.add('open'); });
        document.getElementById('scrollTopBtn').addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        function updateFavBadge() { const count = favorites.size; document.getElementById('favCount').textContent = count; const badge=document.getElementById('favBadge'); badge.textContent=count; badge.style.display=count>0?'flex':'none'; }

        // =================================================================
        //  10. 搜索 & 随机
        // =================================================================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim().toLowerCase();
            if(!keyword) return renderGames(GAMES_DATA);
            const filtered = GAMES_DATA.filter(g => g.title.toLowerCase().includes(keyword) || g.description.toLowerCase().includes(keyword));
            renderGames(filtered);
        });
        document.getElementById('randomBtn').addEventListener('click', function() {
            if(GAMES_DATA.length === 0) return showToast('⚠️ 当前没有可用的游戏');
            const randomIndex = Math.floor(Math.random() * GAMES_DATA.length);
            const game = GAMES_DATA[randomIndex];
            addRecentPlay(game.id);
            showToast(`🎲 随机选择：${game.title}，正在打开...`);
            window.open(game.gameUrl, '_blank');
        });

        // =================================================================
        //  11. 暗黑模式切换
        // =================================================================
        document.getElementById('themeToggle').addEventListener('click', function() {
            const body = document.body; const icon = this.querySelector('i'); body.classList.toggle('dark-mode');
            if(body.classList.contains('dark-mode')) { icon.className = 'fas fa-sun'; saveTheme('dark'); } else { icon.className = 'fas fa-moon'; saveTheme('light'); }
            const container = document.getElementById('giscus-container');
            if(container.innerHTML.trim() !== '') { document.getElementById('commentModal').classList.remove('open'); container.innerHTML = ''; showToast('🌙 主题已切换，请重新点击评论加载'); }
        });

        // =================================================================
        //  12. 初始化启动
        // =================================================================
        async function init() {
            loadTheme(); loadFavorites();
            await renderGames();
            updateFavBadge();
            fetchAndRenderRank();
        }
        if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
    </script>
</body>
</html>
